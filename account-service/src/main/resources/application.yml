server:
  port: 8081

spring:
  application:
    name: account-service
  datasource:
    url: jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

management:
  tracing:
    sampling:
      # Every request is traced (rather than Spring Boot's 10% default) — the brief requires a
      # trace ID be generated per request, not sampled probabilistically.
      probability: 1.0
